<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="100%" height="100%">
  <defs>
    <!-- Glow Filter for the animated lines -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Glowing Light from behind -->
    <radialGradient id="lightGlow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#ff4f64" stop-opacity="0.6" />
      <stop offset="40%" stop-color="#ff4f64" stop-opacity="0.1" />
      <stop offset="100%" stop-color="transparent" stop-opacity="0" />
    </radialGradient>

    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4f64" />
      <stop offset="50%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#ff4f64" />
    </linearGradient>
  </defs>

  <!-- Dark Background (optional, making it transparent looks better on GitHub dark mode) -->
  <rect width="100%" height="100%" fill="transparent" />

  <!-- Animated pulsing central light -->
  <circle cx="500" cy="300" r="250" fill="url(#lightGlow)">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="4s" repeatCount="indefinite" />
    <animate attributeName="r" values="220;280;220" dur="4s" repeatCount="indefinite" />
  </circle>

  <!-- Animated flowing lines around the image (Border glow) -->
  <rect x="190" y="90" width="620" height="420" rx="20" fill="none" stroke="url(#lineGrad)" stroke-width="4" filter="url(#glow)" stroke-dasharray="200 100">
    <animate attributeName="stroke-dashoffset" values="0;300" dur="3s" repeatCount="indefinite" />
  </rect>
  <rect x="180" y="80" width="640" height="440" rx="25" fill="none" stroke="#ffffff" stroke-width="1" stroke-dasharray="100 200" opacity="0.3">
    <animate attributeName="stroke-dashoffset" values="300;0" dur="5s" repeatCount="indefinite" />
  </rect>

  <!-- Animated Particles/Rays -->
  <g opacity="0.6" filter="url(#glow)">
    <circle cx="200" cy="150" r="3" fill="#fff">
      <animate attributeName="cy" values="150;50;150" dur="5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;1;0" dur="5s" repeatCount="indefinite" />
    </circle>
    <circle cx="800" cy="450" r="4" fill="#ff4f64">
      <animate attributeName="cy" values="450;550;450" dur="6s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;1;0" dur="6s" repeatCount="indefinite" />
    </circle>
    <circle cx="820" cy="120" r="2" fill="#fff">
      <animate attributeName="cx" values="820;900;820" dur="4s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite" />
    </circle>
    <circle cx="180" cy="480" r="5" fill="#ff4f64">
      <animate attributeName="cx" values="180;100;180" dur="7s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;1;0" dur="7s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- The User's Image (Embedded using absolute raw GitHub URL) -->
  <!-- Image is 2762 x 1452 (aspect ratio ~ 1.9), scaled to fit in 600x315 -->
  <image href="https://raw.githubusercontent.com/samay-hash/NEUROME/main/profileee.png" x="200" y="100" width="600" height="400" preserveAspectRatio="xMidYMid slice" style="border-radius: 16px;" clip-path="url(#imageClip)" />

  <!-- Clip path to round the image corners inside the SVG -->
  <clipPath id="imageClip">
    <rect x="200" y="100" width="600" height="400" rx="16" />
  </clipPath>

</svg>
